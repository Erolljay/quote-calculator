<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookkeeping & Tax Compliance Quote Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .form-radio-group div {
            margin-bottom: 0.5rem;
        }
        #quoteResult {
            transition: all 0.3s ease-in-out;
        }
        #quoteResult.clickable {
            cursor: pointer;
            background-color: #dbeafe;
        }
        #quoteResult.clickable:hover {
            background-color: #bfdbfe;
        }
        .required-indicator::after {
            content: '*';
            color: red;
            margin-left: 0.25rem;
        }
        .service-section {
            @apply border border-gray-300 p-4 rounded-md mb-6;
        }
        .service-title {
            @apply text-lg font-semibold text-gray-700 px-2 mb-3;
        }
        .service-grid {
            @apply grid grid-cols-1 md:grid-cols-2 gap-4;
        }
        .service-item {
            @apply flex items-center space-x-2;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div class="container mx-auto max-w-4xl p-6 md:p-8 my-10 bg-white rounded-lg shadow-md">

        <h1 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-2">Bookkeeping & Tax Compliance</h1>
        <h2 class="text-xl md:text-2xl font-semibold text-center text-blue-600 mb-6">Quote Calculator</h2>
        <p class="text-center text-gray-600 mb-8">Select the services you need to get an estimated monthly and annual fee.</p>

        <form id="quoteForm" class="space-y-6">
            <!-- Client Type -->
            <fieldset class="service-section">
                <legend class="service-title">Client Type</legend>
                <div class="space-y-2 form-radio-group">
                    <div>
                        <input type="radio" id="individual" name="clientType" value="individual" data-label="Individual" class="form-radio text-blue-600 focus:ring-blue-500" required checked>
                        <label for="individual" class="ml-2 text-gray-700">Individual</label>
                    </div>
                    <div>
                        <input type="radio" id="nonIndividual" name="clientType" value="non-individual" data-label="Non-Individual" class="form-radio text-blue-600 focus:ring-blue-500" required>
                        <label for="nonIndividual" class="ml-2 text-gray-700">Non-Individual</label>
                    </div>
                </div>
            </fieldset>

            <!-- Tax Compliance Monthly Services -->
            <fieldset class="service-section">
                <legend class="service-title">Tax Compliance (Monthly)</legend>
                <div class="service-grid">
                    <div class="service-item">
                        <input type="checkbox" id="vatIndividual" name="vatIndividual" value="1000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="vatIndividual" class="text-gray-700">VAT - Individual (₱1,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="vatNonIndividual" name="vatNonIndividual" value="2000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="vatNonIndividual" class="text-gray-700">VAT - Non-Individual (₱2,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="eqRental" name="eqRental" value="1000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="eqRental" class="text-gray-700">1601-EQ (Rental Only) (₱1,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="eqTAMP" name="eqTAMP" value="2000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="eqTAMP" class="text-gray-700">1601-EQ (TAMP Taxpayer) (₱2,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="cLess10" name="cLess10" value="500" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="cLess10" class="text-gray-700">1601-C (<10 Employees) (₱500)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="c10Plus" name="c10Plus" value="1000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="c10Plus" class="text-gray-700">1601-C (10+ Employees) (₱1,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="c30Plus" name="c30Plus" value="2000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="c30Plus" class="text-gray-700">1601-C (30+ Employees) (₱2,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="c50Plus" name="c50Plus" value="4000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="c50Plus" class="text-gray-700">1601-C (50+ Employees) (₱4,000)</label>
                    </div>
                </div>
            </fieldset>

            <!-- Outsource Contributions -->
            <fieldset class="service-section">
                <legend class="service-title">Outsource Contributions (Monthly)</legend>
                <div class="service-grid">
                    <div class="service-item">
                        <input type="checkbox" id="outsourceLess10" name="outsourceLess10" value="500" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="outsourceLess10" class="text-gray-700">Outsource Contributions (<10 Employees) (₱500)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="outsource10Plus" name="outsource10Plus" value="1000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="outsource10Plus" class="text-gray-700">Outsource Contributions (10+ Employees) (₱1,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="outsource30Plus" name="outsource30Plus" value="2000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="outsource30Plus" class="text-gray-700">Outsource Contributions (30+ Employees) (₱2,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="outsource50Plus" name="outsource50Plus" value="4000" data-type="monthly" class="form-checkbox text-blue-600">
                        <label for="outsource50Plus" class="text-gray-700">Outsource Contributions (50+ Employees) (₱4,000)</label>
                    </div>
                </div>
            </fieldset>

            <!-- Annual Tax Compliance -->
            <fieldset class="service-section">
                <legend class="service-title">Tax Compliance (Annual)</legend>
                <div class="service-grid">
                    <div class="service-item">
                        <input type="checkbox" id="fsIndividual" name="fsIndividual" value="5000" data-type="annual" class="form-checkbox text-blue-600">
                        <label for="fsIndividual" class="text-gray-700">Preparation of Annual FS and ITR (Individual) (₱5,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="fsNonIndividual" name="fsNonIndividual" value="10000" data-type="annual" class="form-checkbox text-blue-600">
                        <label for="fsNonIndividual" class="text-gray-700">Preparation of Annual FS and ITR (Non-Individual) (₱10,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="inventory" name="inventory" value="3000" data-type="annual" class="form-checkbox text-blue-600">
                        <label for="inventory" class="text-gray-700">Inventory Listing (₱3,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="sawt" name="sawt" value="3000" data-type="annual" class="form-checkbox text-blue-600">
                        <label for="sawt" class="text-gray-700">SAWT Generation (₱3,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="filing1604C" name="filing1604C" value="3000" data-type="annual" class="form-checkbox text-blue-600">
                        <label for="filing1604C" class="text-gray-700">1604C Filing (₱3,000)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="filing1604F" name="filing1604F" value="3000" data-type="annual" class="form-checkbox text-blue-600">
                        <label for="filing1604F" class="text-gray-700">1604F Filing (₱3,000)</label>
                    </div>
                </div>
            </fieldset>

            <!-- Other Services -->
            <fieldset class="service-section">
                <legend class="service-title">Other Services</legend>
                <div class="service-grid">
                    <div class="service-item">
                        <input type="checkbox" id="businessPermit" name="businessPermit" value="3500" data-type="other" class="form-checkbox text-blue-600">
                        <label for="businessPermit" class="text-gray-700">Business Permit Renewal (₱3,500)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="birOrus" name="birOrus" value="1500" data-type="other" class="form-checkbox text-blue-600">
                        <label for="birOrus" class="text-gray-700">BIR ORUS Service (₱1,500)</label>
                    </div>
                    <div class="service-item">
                        <input type="checkbox" id="secFiling" name="secFiling" value="1500" data-type="other" class="form-checkbox text-blue-600">
                        <label for="secFiling" class="text-gray-700">SEC Filing Service (₱1,500)</label>
                    </div>
                </div>
            </fieldset>

            <!-- Contact Information -->
            <fieldset class="service-section">
                <legend class="service-title">Your Contact Information</legend>
                <div class="space-y-4 mt-2">
                    <div>
                        <label for="fullName" class="block text-sm font-medium text-gray-700 required-indicator">Full Name</label>
                        <input type="text" name="fullName" id="fullName" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Juan Dela Cruz">
                    </div>
                     <div>
                        <label for="companyName" class="block text-sm font-medium text-gray-700">Company Name (Optional)</label>
                        <input type="text" name="companyName" id="companyName" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="Your Business Inc.">
                    </div>
                     <div>
                        <label for="contactNumber" class="block text-sm font-medium text-gray-700 required-indicator">Contact Number</label>
                        <input type="tel" name="contactNumber" id="contactNumber" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm" placeholder="0917xxxxxxx">
                    </div>
                </div>
            </fieldset>

            <div id="quoteResult" class="mt-8 p-4 bg-blue-50 border border-blue-200 rounded-md text-center text-lg font-semibold text-blue-800 opacity-0 scale-95">
                Select options to see estimated fees.
            </div>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const quoteForm = document.getElementById('quoteForm');
            const quoteResultDiv = document.getElementById('quoteResult');
            const fullNameInput = document.getElementById('fullName');
            const companyNameInput = document.getElementById('companyName');
            const contactNumberInput = document.getElementById('contactNumber');

            let currentQuoteDetails = null;
            let currentMonthlyTotal = 0;
            let currentAnnualTotal = 0;
            let currentOtherTotal = 0;
            let quoteGenerated = false;

            function calculateQuote() {
                console.log("Calculating quote...");
                
                // Get client type for base fee
                const clientTypeInput = quoteForm.querySelector('input[name="clientType"]:checked');
                const clientType = clientTypeInput ? clientTypeInput.value : 'individual';
                
                // Base monthly fee
                let baseMonthly = clientType === 'individual' ? 1000 : 2000;
                
                // Calculate monthly add-ons
                let monthlyAddons = 0;
                const monthlyCheckboxes = document.querySelectorAll('input[data-type="monthly"]:checked');
                monthlyCheckboxes.forEach(cb => {
                    monthlyAddons += parseInt(cb.value);
                });

                // Calculate annual services
                let annualTotal = 0;
                const annualCheckboxes = document.querySelectorAll('input[data-type="annual"]:checked');
                annualCheckboxes.forEach(cb => {
                    annualTotal += parseInt(cb.value);
                });

                // Calculate other services
                let otherTotal = 0;
                const otherCheckboxes = document.querySelectorAll('input[data-type="other"]:checked');
                otherCheckboxes.forEach(cb => {
                    otherTotal += parseInt(cb.value);
                });

                // Store totals
                currentMonthlyTotal = baseMonthly + monthlyAddons;
                currentAnnualTotal = annualTotal;
                currentOtherTotal = otherTotal;

                // Store details for email
                currentQuoteDetails = {
                    clientType: clientType === 'individual' ? 'Individual' : 'Non-Individual',
                    baseMonthly: baseMonthly,
                    monthlyAddons: monthlyAddons,
                    monthlyTotal: currentMonthlyTotal,
                    annualTotal: currentAnnualTotal,
                    otherTotal: currentOtherTotal,
                    grandTotal: (currentMonthlyTotal * 12) + currentAnnualTotal + currentOtherTotal,
                    services: {
                        monthly: Array.from(monthlyCheckboxes).map(cb => cb.nextElementSibling.textContent.trim()),
                        annual: Array.from(annualCheckboxes).map(cb => cb.nextElementSibling.textContent.trim()),
                        other: Array.from(otherCheckboxes).map(cb => cb.nextElementSibling.textContent.trim())
                    }
                };

                // Format display
                const monthlyDisplay = currentMonthlyTotal.toLocaleString('en-PH', { style: 'currency', currency: 'PHP' });
                const annualDisplay = currentAnnualTotal.toLocaleString('en-PH', { style: 'currency', currency: 'PHP' });
                const otherDisplay = currentOtherTotal.toLocaleString('en-PH', { style: 'currency', currency: 'PHP' });
                const yearlyTotal = ((currentMonthlyTotal * 12) + currentAnnualTotal + currentOtherTotal).toLocaleString('en-PH', { style: 'currency', currency: 'PHP' });

                quoteResultDiv.textContent = `Monthly: ${monthlyDisplay} | Annual: ${annualDisplay} | Other: ${otherDisplay} | Year 1 Total: ${yearlyTotal}`;
                quoteResultDiv.classList.remove('opacity-0', 'scale-95');
                quoteResultDiv.classList.add('opacity-100', 'scale-100', 'clickable');
                quoteGenerated = true;
            }

            function generateEmailInquiry() {
                const fullName = fullNameInput.value.trim();
                const contactNumber = contactNumberInput.value.trim();

                if (!fullName || !contactNumber) {
                    alert("Please fill in your Full Name and Contact Number.");
                    if (!fullName) fullNameInput.classList.add('border-red-500');
                    if (!contactNumber) contactNumberInput.classList.add('border-red-500');
                    return;
                }

                if (!quoteGenerated || !currentQuoteDetails) {
                    alert("Please calculate a quote first.");
                    return;
                }

                const companyName = companyNameInput.value.trim();
                const recipient = "info@tallocpa.com";
                const subject = "Service Inquiry - Quote Calculator";

                let body = `Hello,\n\n`;
                body += `I am interested in your Bookkeeping & Tax Compliance service based on the quote calculator.\n\n`;
                body += `--- My Contact Information ---\n`;
                body += `Full Name: ${fullName}\n`;
                if (companyName) body += `Company Name: ${companyName}\n`;
                body += `Contact Number: ${contactNumber}\n\n`;
                body += `--- Quote Summary ---\n`;
                body += `Client Type: ${currentQuoteDetails.clientType}\n`;
                body += `Base Monthly Fee: ₱${currentQuoteDetails.baseMonthly}\n`;
                body += `Monthly Add-ons: ₱${currentQuoteDetails.monthlyAddons}\n`;
                body += `Total Monthly: ₱${currentQuoteDetails.monthlyTotal}\n`;
                body += `Annual Services: ₱${currentQuoteDetails.annualTotal}\n`;
                body += `Other Services: ₱${currentQuoteDetails.otherTotal}\n`;
                body += `Year 1 Total: ₱${(currentQuoteDetails.monthlyTotal * 12) + currentQuoteDetails.annualTotal + currentQuoteDetails.otherTotal}\n\n`;

                if (currentQuoteDetails.services.monthly.length > 0) {
                    body += `Monthly Services Selected:\n`;
                    currentQuoteDetails.services.monthly.forEach(s => body += `  • ${s}\n`);
                    body += `\n`;
                }
                if (currentQuoteDetails.services.annual.length > 0) {
                    body += `Annual Services Selected:\n`;
                    currentQuoteDetails.services.annual.forEach(s => body += `  • ${s}\n`);
                    body += `\n`;
                }
                if (currentQuoteDetails.services.other.length > 0) {
                    body += `Other Services Selected:\n`;
                    currentQuoteDetails.services.other.forEach(s => body += `  • ${s}\n`);
                    body += `\n`;
                }

                body += `Please send me a proposal.\n\nThank you`;

                const encodedSubject = encodeURIComponent(subject);
                const encodedBody = encodeURIComponent(body);
                const mailtoLink = `mailto:${recipient}?subject=${encodedSubject}&body=${encodedBody}`;
                window.location.href = mailtoLink;
            }

            // Add event listeners
            const allInputs = quoteForm.querySelectorAll('input');
            allInputs.forEach(input => {
                input.addEventListener('change', calculateQuote);
            });

            [fullNameInput, contactNumberInput].forEach(input => {
                input.addEventListener('input', () => {
                    if (input.value.trim()) {
                        input.classList.remove('border-red-500');
                    }
                });
            });

            quoteResultDiv.addEventListener('click', generateEmailInquiry);
            calculateQuote();
        });
    </script>

</body>
</html>
